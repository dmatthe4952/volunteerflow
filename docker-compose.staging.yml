services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
      APP_PORT: 3000
      APP_TIMEZONE: America/New_York
      APP_LOG_FILE: /app/logs/app.log
    ports:
      # NOTE: these `${...}` values are substituted by Docker Compose *before* containers start.
      # To load them from `.env.staging`, run with: `docker compose --env-file .env.staging ...`
      - "${APP_BIND_IP:-127.0.0.1}:${APP_HOST_PORT:-3000}:3000"
    volumes:
      - uploads:/app/uploads
      - ./logs:/app/logs

  # Optional local Postgres (use only if you are NOT using a managed DB).
  # Enable with: docker compose -f docker-compose.staging.yml --profile localdb up -d
  db:
    profiles: ["localdb"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: volunteerflow
      POSTGRES_USER: volunteerflow
      POSTGRES_PASSWORD: volunteerflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volunteerflow -d volunteerflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  caddy:
    profiles: ["caddy"]
    image: caddy:2-alpine
    env_file:
      - .env.staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:

name: localshifts-test

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: localshifts_test
      POSTGRES_USER: localshifts
      POSTGRES_PASSWORD: localshifts_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localshifts -d localshifts_test"]
      interval: 2s
      timeout: 3s
      retries: 30

  test:
    image: node:20-alpine
    working_dir: /app
    command: sh -lc "npm ci && npm test"
    environment:
      APP_ENV: test
      APP_PORT: 3000
      APP_URL: http://localhost:3000
      APP_TIMEZONE: America/New_York
      DATABASE_URL: postgres://localshifts:localshifts_password@db:5432/localshifts_test
      SESSION_SECRET: test-only-change-me
      ADMIN_TOKEN: test-ops-change-me
      APP_LOG_FILE: ""
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

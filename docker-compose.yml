services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: volunteerflow
      POSTGRES_USER: volunteerflow
      POSTGRES_PASSWORD: volunteerflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -lc "npm install --no-package-lock && npm run dev"
    environment:
      APP_ENV: development
      APP_PORT: 3000
      APP_URL: http://localhost:3000
      APP_TIMEZONE: America/New_York
      DATABASE_URL: postgres://volunteerflow:volunteerflow_password@db:5432/volunteerflow
      SESSION_SECRET: dev-only-change-me
      ADMIN_TOKEN: dev-ops-change-me
      APP_LOG_FILE: /app/logs/app.log
      # SMTP (optional): set these in local `.env` to enable real email in dev.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-VolunteerFlow}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
      - /app/node_modules
      - uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - db

volumes:
  postgres_data:
  uploads:

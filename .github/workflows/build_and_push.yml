name: Build and Push Docker Image to GHCR

# Controls when the workflow will run
on:
  push:
    branches:
      - main # Trigger on push to the 'main' branch
    tags:
      - 'v*.*.*' # Trigger on pushes of tags that look like version numbers (e.g., v1.0.0)
  pull_request:
    branches:
      - main # Optionally, trigger on PRs to main for testing

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Use a Linux runner

    permissions:
      contents: read # Needed to checkout the code
      packages: write # CRUCIAL: Needed to push to GitHub Container Registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Your GitHub username or organization name
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub's built-in token with package write permissions

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            # Use the latest tag for the main branch
            type=raw,value=latest,enable={{is_main}}
            # Use version tags for releases
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Use commit SHA for all pushes
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker # Path to your Dockerfile and build context ('.' means current directory)
          push: true # Set to true to push the image after building
          tags: ${{ steps.meta.outputs.tags }} # Use tags generated by the metadata action
          labels: ${{ steps.meta.outputs.labels }} # Use labels generated by the metadata action
